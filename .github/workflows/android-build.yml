name: Build Android APK (Auto Path Finder)

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # هذه الخطوة ستبحث عن مجلد الأندرويد وتخرجه للواجهة
      - name: Move Android folder to Root
        run: |
          if [ ! -d "android" ]; then
            echo "Searching for android folder in node_modules..."
            # البحث عن المجلد الذي يحتوي على gradlew
            TARGET_PATH=$(find . -name "gradlew" -not -path "*/.*" | head -n 1 | xid -d)
            if [ -n "$TARGET_PATH" ]; then
               cp -r $TARGET_PATH ./android
               echo "Found and moved android folder from $TARGET_PATH"
            else
               echo "Android folder not found. Creating a new one..."
               npx react-native init TempApp --skip-install --version latest
               mv TempApp/android ./android
            fi
          fi

      - name: Build Android APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AbuAlzahra-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
