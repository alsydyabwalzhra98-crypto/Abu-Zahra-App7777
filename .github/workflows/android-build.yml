name: Build Android APK (Auto CLI)

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # بدلاً من توليد Bundle، سنقوم بإنشاء هيكل أندرويد إذا كان مفقوداً
      - name: Initialize Android Structure
        run: |
          if [ ! -d "android" ]; then
            npx react-native ctx-clean || true
            npx react-native init TempApp --version latest --skip-install
            mv TempApp/android ./android
            rm -rf TempApp
          fi

      - name: Build Android APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AbuAlzahra-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
