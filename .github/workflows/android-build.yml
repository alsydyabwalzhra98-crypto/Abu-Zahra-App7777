name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        # استخدمنا npm install بدلاً من ci لأن الأخير يحتاج ملف lock مطابق تماماً
        run: npm install --legacy-peer-deps

      # قمنا بتعديل الخطوة التي سببت الخطأ في الصورة
      - name: Verify Expo project
        run: npx expo-doctor

      # تعديل أمر prebuild ليكون أكثر استقراراً في السيرفر
      - name: Generate Android project
        run: npx expo prebuild --platform android --no-interactive

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find android -name "*.apk" | head -n 1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: abu-alzahra-android-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
