name: Build Android APK (Direct Search)

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Find and Build APK
        run: |
          # البحث عن مكان ملف gradlew الفعلي داخل المستودع
          GRADLEW_PATH=$(find . -name "gradlew" -not -path "*/.*" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "خطأ: لم يتم العثور على ملف gradlew في أي مكان بالمستودع"
            exit 1
          fi
          
          # الحصول على المجلد الذي يحتوي على الملف
          GRADLE_DIR=$(dirname "$GRADLEW_PATH")
          echo "تم العثور على ملف البناء في: $GRADLE_DIR"
          
          # إعطاء صلاحيات التشغيل
          chmod +x "$GRADLEW_PATH"
          
          # بدء البناء من ذلك المجلد
          cd "$GRADLE_DIR"
          ./gradlew assembleDebug --no-daemon

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: AbuAlzahra-App
          # هذا الأمر سيبحث عن أي ملف APK تم إنتاجه ويرفعه لك
          path: "**/*.apk"
