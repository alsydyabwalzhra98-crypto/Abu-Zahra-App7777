name: Build Android APK (Stable Solution)

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.0' # إصدار محدد للمزيد من الاستقرار

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # هذه الخطوة تتجنب خطأ styleText باستخدام الأمر الرسمي الأحدث
      - name: Generate Android Structure
        run: |
          npx @react-native-community/cli init TempApp --version latest --skip-install --no-interactive
          mv TempApp/android ./android
          rm -rf TempApp

      - name: Build Android APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AbuAlzahra-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
